{%- extends "layout.html" -%}
<!-- This is the new account page where users can create a new account. There is a box to enter name,
 institution, account_type dropdown, currency -->
{%- block main -%}
<div class="container mt-4">
    <h2>Enter New Account Details</h2>
    <form method="post" action="/accounts/new">
        <div class="mb-3">
            <label for="account_name" class="form-label">Account Name</label>
            <input type="text" class="form-control" id="account_name" name="account_name" required>
        </div>
        <div class="mb-3">
            <label for="institution" class="form-label">Financial Institution</label>
            <input type="text" class="form-control" id="institution" name="institution" required>
        </div>
        <div class="mb-3">
            <label for="account_type" class="form-label">Account Type</label>
            <select class="form-select" id="account_type" name="account_type" required>
                <option value="">Select account type</option>
                <option value="checking">Checking</option>
                <option value="savings">Savings</option>
                <option value="credit">Credit Card</option>
                <option value="investment">Investment</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="currency" class="form-label">Currency</label>
            <input type="text" class="form-control" id="currency" name="currency" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
</div>
{%- endblock -%}
