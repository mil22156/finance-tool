{%- extends "layout.html" -%}

<!--Summary table including date range, account amount and total-->

{% block main %}
    <div class="container mt-4">
        <h2>Budget Summary</h2>
        <!-- Form to select the data to present-->
        <!-- This form is to allow the user to filter the data desired-->
        <form method="GET" action="/summary">
            <!-- TODO show number of records in datashet and total USD-->
            
            
            <!-- Column Heahders for Summary Table -->
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Account</th>
                        <th>Count</th>
                        <th>Category</th>
                        <th>Amount</th>
                    </tr>
                    <!-- filter input boxes for each column -->
                     <tr>
                        <th>
                            <input type="date" name="date_from" class="form-control form-control-sm" value="{{ date_from }}">
                            <input type="date" name="date_to" class="form-control form-control-sm" value="{{ date_to }}">
                        </th>
                        <th>                     
                            <select class="form-control" id="filter_account" name="filter_account">
                                {% for acc in account_list %}
                                <!-- this next line I copied from AI. I was not getting it right-->
                                 <option value="{{ acc['name'] }}" {% if acc['name']|string == filter_account %}selected{% endif %}>{{ acc['name'] }}</option>
                                {% endfor %}   
                            </select>
                        </th>
                        <th></th>
                        <th>                       
                            <select class="form-control" id="filter_category" name="filter_category">
                                <option value="">-- None --</option>
                                <option value="__uncategorized__">-- Uncategorized --</option>
                                {% for cat in categories_list %}
                                <!-- this next line I copied from AI. I was not getting it right-->
                                 <option value="{{ cat['name'] }}" {% if cat['name']|string == filter_category %}selected{% endif %}>{{ cat['name'] }}</option>
                                {% endfor %}   
                            </select>                         
                        </th>
                        <th></th>
                     </tr>
                    </thead>
                    <tbody>
                        {% for c in summary_display %}
                            <tr>
                                <td></td>
                                <td></td>
                                <td>{{ c['cnt'] }}</td>                                
                                <td>{{ c['category'] }}</td>
                                <td class="{{ 'text-danger' if c['total'] < 0 else '' }}">
                                {{ "%.2f"|format(c['total']) }}
                            </tr>
                        {% endfor %}
                    </tbody>
            </table>
            <button type="submit" class="btn btn-primary btn-sm">Apply</button>
        </form>
    </div>
{% endblock %}
