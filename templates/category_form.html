{%- extends "layout.html" -%}
<!-- This is the category page page. If there is an category ID in the URL it will open in edit mode with the edit and delete options -->
<!-- if no category id is in the URL is will show as a create account form-->
{%- block main -%}
<div class="container mt-4">
    <h2>{{ 'Edit Category' if category else 'Add Category' }}</h2>
    <form method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Category Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ category['name'] if category else '' }}" required>
        </div>
        <select class="form-control" id="parentCategory" name="parent_id">
            <option value="">-- None --</option>
            {% for parent in categories_list %}
            <!-- this next line I copied from AI. I was not getting it right-->
            <option value="{{ parent['id'] }}" {% if category and parent['id'] == category['parent_id'] %}selected{% endif %}>{{ parent['name'] }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary">{{ 'Update Category' if category else 'Create Category' }}</button>
        <a href="/categories" class="btn btn-secondary ms-2">Cancel</a>
    </form>
    {% if category %}    
    <form method="POST" action="/categories/delete/{{ category['id'] }}" class="mt-3">
        <button type="submit" class="btn mb-2 btn-danger">Delete Category</button>
    </form>
    {% endif %}

</div>

{%- endblock -%}
